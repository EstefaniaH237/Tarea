<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSOO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style3.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script3.js"></script>
</head>
<body class="container" onload="cargarLista();">
    
        <form>
            <div class="forma2">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Identificador</label>
                    <input type="text" class="form-control" id="cajaId">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="cajaName">
                </div>
                <label for="exampleFormControlInput1" class="form-label">Género</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="r1" id="r1" value="Femenino">
                    <label class="form-check-label" for="radioDefault1">
                      Femenino
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="r1" id="r1" checked value="Masculino">
                    <label class="form-check-label" for="radioDefault2">
                      Masculino
                    </label>
                </div>
                <div>
                    <button type="button" class="btn btn-outline-danger" onclick="agregarUser();">Agregar un Usuario</button>
                    <button type="button" class="btn btn-outline-warning" onclick="verUserVentana();">Ver Usuarios</button>    
                     <button type="button" class="btn btn-outline-info" onclick="actualizarUser();">Actualizar Usuario</button>
                    <button type="button" class="btn btn-outline-dark" onclick="eliminarUser();">Eliminar Usuario</button>     
                </div>
                        
            </div>
            
        </form>
    
    
</body>
</html>
