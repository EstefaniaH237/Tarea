<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Indie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>
<body class="bg-dark text-white">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card border-0 shadow bg-dark bg-opacity-75 text-white p-4 rounded">
                    <div class="card-body">
                        <h2 class="text-center mb-4 fw-bold text-info">Únete al mundo indie</h2>
                        
                        <form action="pixel.html" method="GET">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre de usuario</label>
                                <input type="text" class="form-control bg-secondary bg-opacity-25 text-white border-secondary" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo electrónico</label>
                                <input type="email" class="form-control bg-secondary bg-opacity-25 text-white border-secondary" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Fecha de nacimiento</label>
                                <input type="date" class="form-control bg-secondary bg-opacity-25 text-white border-secondary" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Género favorito</label>
                                <select class="form-select bg-secondary bg-opacity-25 text-white border-secondary" required>
                                    <option value="" class="text-dark">Selecciona una opción...</option>
                                    <option value="pixel" class="text-dark">Pixel Art</option>
                                    <option value="rogue" class="text-dark">Roguelike</option>
                                    <option value="sim" class="text-dark">Simulación</option>
                                </select>
                            </div>
                            
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="check" required>
                                <label class="form-check-label" for="check">Acepto recibir actualizaciones de la comunidad</label>
                            </div>
                            
                            <button type="submit" class="btn btn-outline-info w-100 fw-bold">Enviar registro</button>
                        </form>
                        
                        <div class="mt-3 text-center">
                            <a href="pixel.html" class="text-white-50">Volver al inicio</a>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
